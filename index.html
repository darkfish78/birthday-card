<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生日快乐</title>
<style>
/* ===== 全局 ===== */
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; scroll-snap-type: y mandatory; }
body {
    font-family: "Microsoft YaHei", "PingFang SC", "Noto Serif SC", serif;
    background: #0a0a0a;
    color: #fff;
    overflow-x: hidden;
}

/* ===== 视频背景首页 ===== */
.video-section {
    position: relative;
    width: 100%; height: 100vh;
    scroll-snap-align: start;
    overflow: hidden;
}
.video-section iframe {
    position: absolute;
    top: 50%; left: 50%;
    width: 100vw; height: 56.25vw;
    min-width: 100vw; min-height: 100vh;
    transform: translate(-50%, -50%);
    border: none;
    pointer-events: none;
}
.video-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to bottom, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.4) 70%, rgba(0,0,0,0.8) 100%);
    z-index: 1;
    pointer-events: none;
}
.video-hint {
    position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
    z-index: 2; text-align: center;
}
.video-hint .scroll-text {
    font-size: 16px; letter-spacing: 4px;
    color: rgba(255,255,255,0.8);
    animation: fadeInOut 2.5s ease-in-out infinite;
}
.video-hint .scroll-arrow {
    display: block; margin: 12px auto 0;
    width: 24px; height: 40px;
    border: 2px solid rgba(255,255,255,0.6);
    border-radius: 12px;
    position: relative;
}
.scroll-arrow::after {
    content: '';
    position: absolute; top: 8px; left: 50%;
    width: 4px; height: 10px;
    background: rgba(255,255,255,0.8);
    border-radius: 2px;
    transform: translateX(-50%);
    animation: scrollDown 1.8s ease-in-out infinite;
}
@keyframes scrollDown {
    0%, 100% { top: 8px; opacity: 0.3; }
    50% { top: 18px; opacity: 1; }
}
@keyframes fadeInOut {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
}

/* ===== 幻灯片区域 ===== */
.slide-section {
    position: relative;
    width: 100%; height: 100vh;
    scroll-snap-align: start;
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    background: #0a0a0a;
}
.slide-bg {
    position: absolute; inset: 0;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    filter: brightness(0.55);
    transition: filter 0.8s ease;
}
.slide-section.visible .slide-bg { filter: brightness(0.7); }

/* 生日快乐字幕 */
.birthday-text {
    position: absolute; z-index: 2;
    text-align: center;
    opacity: 0;
    transform: translateY(-120px);
    transition: none;
}
.slide-section.visible .birthday-text {
    animation: textDrop 1.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}
@keyframes textDrop {
    0%   { opacity: 0; transform: translateY(-150px) scale(0.6); }
    50%  { opacity: 1; transform: translateY(0) scale(1.05); }
    65%  { opacity: 1; transform: translateY(-8px) scale(0.97); }
    80%  { opacity: 1; transform: translateY(0) scale(1.01); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
}
.birthday-text h2 {
    font-size: clamp(42px, 7vw, 80px);
    font-weight: 700;
    letter-spacing: 12px;
    background: linear-gradient(135deg, #ff6b9d, #ffb347, #ff6b9d);
    background-size: 200% 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: gradientShift 3s ease-in-out infinite;
    text-shadow: none;
    filter: drop-shadow(0 0 30px rgba(255,107,157,0.5));
}
@keyframes gradientShift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
}
.birthday-text .sub {
    font-size: clamp(14px, 2vw, 20px);
    letter-spacing: 6px;
    color: rgba(255,255,255,0.7);
    margin-top: 16px;
    opacity: 0;
    animation: fadeUp 0.8s 0.6s ease forwards;
}
@keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

/* 照片序号标签 */
.slide-tag {
    position: absolute; bottom: 40px; right: 40px; z-index: 2;
    font-size: 13px; letter-spacing: 3px;
    color: rgba(255,255,255,0.4);
    opacity: 0;
    transition: opacity 1s ease;
}
.slide-section.visible .slide-tag { opacity: 1; }

/* 进度条 */
.progress-bar {
    position: fixed; right: 16px; top: 50%; transform: translateY(-50%);
    z-index: 100; display: flex; flex-direction: column; gap: 14px;
}
.progress-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.25);
    transition: all 0.4s ease;
    cursor: pointer;
}
.progress-dot.active {
    background: #ff6b9d;
    box-shadow: 0 0 12px rgba(255,107,157,0.8);
    transform: scale(1.4);
}

/* ===== 结尾卡片 ===== */
.end-section {
    position: relative;
    width: 100%; height: 100vh;
    scroll-snap-align: start;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #1a0a10 0%, #2d1420 40%, #1a0a10 100%);
    text-align: center;
}
.end-content h3 {
    font-size: clamp(28px, 5vw, 48px);
    font-weight: 300;
    letter-spacing: 8px;
    background: linear-gradient(135deg, #ff6b9d, #ffb347);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}
.end-content .heart {
    display: inline-block;
    animation: heartbeat 1.2s ease-in-out infinite;
    font-size: 48px;
    margin-top: 20px;
}
@keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    15% { transform: scale(1.25); }
    30% { transform: scale(1); }
    45% { transform: scale(1.15); }
    60% { transform: scale(1); }
}

/* 响应式 */
@media (max-width: 768px) {
    .progress-bar { right: 8px; gap: 10px; }
    .progress-dot { width: 6px; height: 6px; }
    .slide-tag { right: 16px; bottom: 24px; }
}
</style>
</head>
<body>

<!-- 视频背景首页 -->
<section class="video-section" id="videoSection">
    <iframe
        src="https://player.bilibili.com/player.html?bvid=BV1ab411n7no&autoplay=1&muted=1&controls=0&loop=1&danmaku=0&t=0"
        allow="autoplay"
        sandbox="allow-scripts allow-same-origin allow-presentation">
    </iframe>
    <div class="video-overlay"></div>
    <div class="video-hint">
        <span class="scroll-text">向下滚动</span>
        <span class="scroll-arrow"></span>
    </div>
</section>

<!-- 幻灯片区域 - 将由 JS 动态生成 -->
<div id="slidesContainer"></div>

<!-- 结尾 -->
<section class="end-section" id="endSection">
    <div class="end-content">
        <h3>愿你永远被爱包围</h3>
        <div class="heart">&hearts;</div>
    </div>
</section>

<!-- 右侧进度条 -->
<div class="progress-bar" id="progressBar"></div>

<script>
// ===== 精选照片 =====
const photos = [
    // cos照 7张
    { src: 'file:///E:/marviswork/生日/cos照/0A4A8009013150F66202A729F6EB4DD6.jpg', tag: '元气满满' },
    { src: 'file:///E:/marviswork/生日/cos照/2FBD6E39F9C6A25B0C3788E52D79737A.jpg', tag: '甜美时光' },
    { src: 'file:///E:/marviswork/生日/cos照/43CC63968C40D182D28C59C40C00C7F7.jpg', tag: '优雅如诗' },
    { src: 'file:///E:/marviswork/生日/cos照/456E5912D18E9747D2399A2DD89624B6.jpg', tag: '雨中漫步' },
    { src: 'file:///E:/marviswork/生日/cos照/6082812289A54673CD90AE0827EE236E.jpg', tag: '暗夜流光' },
    { src: 'file:///E:/marviswork/生日/cos照/958A3BBEF8774EDAAE2F3B4487370D0F.jpg', tag: '庄园午后' },
    { src: 'file:///E:/marviswork/生日/cos照/D0E2A61CBC2875FF1AB801C3E21543C8.jpg', tag: '草地暖阳' },
    // 生活照 6张
    { src: 'file:///E:/marviswork/生日/生活照/0C677531CF3B15E1787FFC313306D9DB.jpg', tag: '慵懒日常' },
    { src: 'file:///E:/marviswork/生日/生活照/12E760BA23BEBFB5030A39BC81E28FBD.jpg', tag: '田园风铃' },
    { src: 'file:///E:/marviswork/生日/生活照/1E53E073BC84A8F7FD2564974D0D7244.jpg', tag: '镜中时光' },
    { src: 'file:///E:/marviswork/生日/生活照/17AEDF0194FCA81F1AF81C1C72B7CF81.jpg', tag: '欢聚时刻' },
    { src: 'file:///E:/marviswork/生日/生活照/7DAC66202BF1349539FCC5F6046F135B.jpg', tag: '可爱冬日' },
    { src: 'file:///E:/marviswork/生日/生活照/985F9B3F5E599C483BE434C97A0A48AF.jpg', tag: '灿烂笑容' }
];

// ===== 每页生日祝福语（13条） =====
const blessings = [
    '愿你岁岁平安，年年如意',
    '生日快乐，永远美丽动人',
    '愿你眼里有光，心中有爱',
    '愿你被世界温柔以待',
    '新的一岁，新的精彩',
    '愿你所愿，终能实现',
    '生日快乐，万事胜意',
    '愿你永远自由如风',
    '岁月不败美人，生日快乐',
    '愿你每天都像今天一样开心',
    '感谢相遇，生日快乐',
    '愿你前程似锦，未来可期',
    '生日快乐，愿你永远闪闪发光'
];

// ===== 生成幻灯片和进度条 =====
const container = document.getElementById('slidesContainer');
const progressBar = document.getElementById('progressBar');

photos.forEach((photo, i) => {
    // 幻灯片
    const section = document.createElement('section');
    section.className = 'slide-section';
    section.id = 'slide' + i;
    section.innerHTML = `
        <div class="slide-bg" style="background-image:url('${photo.src}')"></div>
        <div class="birthday-text">
            <h2>${blessings[i]}</h2>
            <div class="sub">Happy Birthday</div>
        </div>
        <div class="slide-tag">${String(i+1).padStart(2,'0')} · ${photo.tag}</div>
    `;
    container.appendChild(section);

    // 进度点
    const dot = document.createElement('span');
    dot.className = 'progress-dot';
    dot.title = photo.tag;
    dot.onclick = () => {
        section.scrollIntoView({ behavior: 'smooth' });
    };
    progressBar.appendChild(dot);
});

// ===== Intersection Observer =====
const allSections = document.querySelectorAll('.slide-section, .video-section, .end-section');
const dots = document.querySelectorAll('.progress-dot');

// 为视频区添加一个虚拟对应的dot索引（用第一个dot位置对应视频区）
const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            const id = entry.target.id;
            
            // 动画触发
            if (entry.target.classList.contains('slide-section')) {
                entry.target.classList.add('visible');
            }

            // 进度条更新
            dots.forEach(d => d.classList.remove('active'));
            if (id === 'videoSection') {
                // 视频区高亮第一个点或不亮
            } else if (id === 'endSection') {
                if (dots.length > 0) dots[dots.length - 1].classList.add('active');
            } else if (id && id.startsWith('slide')) {
                const idx = parseInt(id.replace('slide', ''));
                if (dots[idx]) dots[idx].classList.add('active');
            }
        }
    });
}, { threshold: 0.6 });

allSections.forEach(s => observer.observe(s));

// ===== 视频自动播放处理 =====
// B站播放器通过 URL 参数 autoplay=1 自动播放，若被浏览器阻止则静音播放
document.addEventListener('DOMContentLoaded', () => {
    // 预加载第一张幻灯片背景
    if (photos.length > 0) {
        const img = new Image();
        img.src = photos[0].src;
    }
});
</script>
</body>
</html>
